<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text To Two</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=contrast" />
    <link rel="stylesheet" href="ttt.css">
</head>
<body>
    <div class="decoration">Text To Two</div>

    <div id="contextMenu">
        <div class="context-menu-item" data-action="selectAll">
            <span class="material-icons">select_all</span>
            <span>全选</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" data-action="copy">
            <span class="material-icons">content_copy</span>
            <span>复制</span>
        </div>
        <div class="context-menu-item" data-action="paste">
            <span class="material-icons">content_paste</span>
            <span>粘贴</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" data-action="feedback">
            <span class="material-icons">feedback</span>
            <span>反馈</span>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="material-icons">code</span>
                    <span>Text To Two</span>
                </div>
            </div>
            <div class="card-body">
                <div class="form-section">
                    <label class="form-label">
                        <span class="material-icons">swap_horiz</span>
                        模式
                    </label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="mode-text2binary" name="convertMode" value="text2binary" checked>
                            <label for="mode-text2binary">
                                英语转二进制
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="mode-binary2text" name="convertMode" value="binary2text">
                            <label for="mode-binary2text">
                                二进制转英文
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <label class="form-label" id="inputLabel">
                        <span class="material-icons">input</span>
                        输入
                    </label>
                    <div class="textarea-wrapper">
                        <textarea id="inputText" class="form-control" placeholder=""></textarea>
                        <div class="resize-handle" data-target="inputText"></div>
                    </div>
                </div>

                <div class="output-section" id="outputSection" style="display: none;">
                    <div class="output-label">
                        <label class="form-label" style="margin-bottom: 0;">
                            <span class="material-icons">output</span>
                            输出
                        </label>
                        <button class="copy-btn" onclick="copyResult()">
                            <span class="material-icons" style="font-size: 16px;">content_copy</span>
                            复制
                        </button>
                    </div>
                    <div class="output-text" id="outputText"></div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="clearAll()">
                        <span class="material-icons">delete</span>
                        清空
                    </button>
                    <button class="btn btn-primary" id="convertBtn" onclick="convert()">
                        <span class="material-icons">play_arrow</span>
                        运行
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 ByRUDAN 保留所有权利。</p>
        <p>版本号：v0.9:09-BS31</p>
    </footer>

    <button class="float-btn" id="floatBtn">
        <svg class="icon-back-top" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
            <path d="M160-760v-80h640v80H160Zm280 640v-408L336-424l-56-56 200-200 200 200-56 56-104-104v408h-80Z"/>
        </svg>
        <span class="theme-icons">
            <span class="material-symbols-outlined" style="font-size: 24px;">contrast</span>
            <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" height="12px" viewBox="0 -960 960 960" width="12px" fill="#ff4444" style="display: none;">
                <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-85 85v80ZM240-160v-400 400Z"/>
            </svg>
        </span>
    </button>

    <!-- Info 容器 -->
    <div id="infoContainer" class="info-iframe-container" style="display: none;">
        <div class="info-container">
            <h1></h1>
            <div class="info-divider"></div>
            <div class="scrollable-content">
                <p><span></span></p>
            </div>
            <div class="info-divider"></div>
            <button class="info-close-btn">&times;</button>
        </div>
    </div>

    <script src="ttt.js"></script>
</body>
</html>
